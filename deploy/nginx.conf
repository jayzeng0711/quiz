# ============================================================
# deploy/nginx.conf
# 使用方式：把此檔複製到 /etc/nginx/sites-available/quiz
# 然後執行：sudo ln -s /etc/nginx/sites-available/quiz /etc/nginx/sites-enabled/
# 把 YOUR_DOMAIN 換成你的真實網域（例如 quiz.example.com）
# ============================================================

server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # certbot 安裝 SSL 後會自動把此 block 改為 301 redirect
    root /var/www/quiz/public;
    index index.php;

    charset utf-8;
    client_max_body_size 20M;

    # Laravel 路由
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP 處理
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120;
    }

    # 禁止存取隱藏檔
    location ~ /\. {
        deny all;
    }

    # 靜態資源快取 30 天
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    # 安全 headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    access_log /var/log/nginx/quiz_access.log;
    error_log  /var/log/nginx/quiz_error.log;
}
